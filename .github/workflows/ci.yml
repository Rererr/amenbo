name: CI

on:
  push:
    branches: [main]
  pull_request:

# Chromium遅延化(postinstall廃止)対応: 以前はここでms-playwrightをactions/cacheしていたが、
# 現在は各ジョブが実際にChromiumを必要とするか実測した結果、いずれも不要と判明したため
# インストール/キャッシュのステップを撤去した(CI高速化)。unitはfetcher/browser.tsをvi.mockで
# 差し替えており、e2eの4ケースもHTTP tierのみで完結する(SPA判定/screenshotを踏まない)。
# ブラウザ層を実際に使うテストを追加する場合は、そのジョブにのみ`npx playwright install chromium`
# ステップを追加すること。
jobs:
  unit:
    strategy:
      fail-fast: false
      matrix:
        # 22.13.0はnode:sqlite移行後の最低サポート版(engines)を実機で常時担保するための固定ピン。
        node-version: ["22.13.0", "24", "26"]
        os: [ubuntu-latest]
        # 日本の利用者はWindows比率が高く、過去にsymlink/argv解決のプラットフォーム依存バグ実績が
        # あるため、node:sqlite・パス解決・CLI引数処理をWindowsでも機械的に検証する(node 24一本)。
        # ブラウザ層はvi.mockで差し替えるためChromiumは不要。
        include:
          - node-version: "24"
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: node scripts/check-version-sync.mjs

  pnpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: "10"
      - uses: actions/setup-node@v5
        with:
          # cache: pnpm はpnpm-lock.yamlが無いとsetup-nodeがエラーになるため指定しない
          # (このリポジトリはpackage-lock.jsonのみをコミットしている)
          node-version: "24"
      # pnpm 10のビルドスクリプトデフォルトブロック(過去実害: better-sqlite3不動作)を
      # 追加の緩和なしで検出する。ネイティブビルド依存の再混入をこのデフォルトブロックで検出する。
      - run: pnpm install
      - run: pnpm run build
      - run: node scripts/mcp-init-smoke.mjs

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "26"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node scripts/e2e-smoke.mjs
