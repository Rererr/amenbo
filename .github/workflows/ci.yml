name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    strategy:
      fail-fast: false
      matrix:
        # 22.13.0はnode:sqlite移行後の最低サポート版(engines)を実機で常時担保するための固定ピン。
        node-version: ["22.13.0", "24", "26"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/playwright'].version")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: node scripts/check-version-sync.mjs

  pnpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10"
      - uses: actions/setup-node@v4
        with:
          # cache: pnpm はpnpm-lock.yamlが無いとsetup-nodeがエラーになるため指定しない
          # (このリポジトリはpackage-lock.jsonのみをコミットしている)
          node-version: "24"
      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/playwright'].version")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      # pnpm 10のビルドスクリプトデフォルトブロック(過去実害: better-sqlite3不動作)を
      # 追加の緩和なしで検出する。package.jsonのpnpm.onlyBuiltDependenciesが効くことの検証を兼ねる。
      - run: pnpm install
      - run: pnpm run build
      - run: node scripts/mcp-init-smoke.mjs

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/playwright'].version")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - run: npm ci
      - run: npm run build
      - run: node scripts/e2e-smoke.mjs
